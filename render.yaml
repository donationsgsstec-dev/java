# Render Blueprint for Spring Boot Attendance System
# This file defines the infrastructure for deploying on Render

services:
  # Web Service - Spring Boot Application
  - type: web
    name: pahappa-attendance-system
    env: java
    region: oregon
    plan: free
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -Dserver.port=$PORT -jar target/user-auth-app-1.0.0.war
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: pahappa-attendance-db
          property: connectionString
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: noreply@pahappa.com
      - key: APP_ADMIN_EMAIL
        sync: false

databases:
  # PostgreSQL Database (Free tier)
  - name: pahappa-attendance-db
    databaseName: attendance_db
    user: attendance_user
    plan: free
    region: oregon

