# Render Blueprint for Spring Boot Attendance System
# This file defines the infrastructure for deploying on Render
# Using existing database: java_vbxv

services:
  # Web Service - Spring Boot Application
  - type: web
    name: pahappa-attendance-system
    env: docker
    region: oregon
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m -Xms256m
      - key: SPRING_PROFILES_ACTIVE
        value: production
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://dpg-d8mv6s8js32c73d4j92g-a.oregon-postgres.render.com:5432/java_vbxv
      - key: SPRING_DATASOURCE_USERNAME
        value: java_vbxv_user
      - key: SPRING_DATASOURCE_PASSWORD
        value: jiQ79h9KMpiwcN1W0KQ9Y7iRPx4iZD8e
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: noreply@pahappa.com
      - key: APP_ADMIN_EMAIL
        sync: false

# No database section - using existing java_vbxv database

