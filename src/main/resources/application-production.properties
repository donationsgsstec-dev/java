# =====================================================
# PRODUCTION CONFIGURATION FOR RENDER DEPLOYMENT
# =====================================================
# This file is used when SPRING_PROFILES_ACTIVE=production

# =====================================================
# SERVER CONFIGURATION
# =====================================================
# Render provides PORT environment variable
server.port=${PORT:8080}
server.servlet.context-path=/

# =====================================================
# DATABASE CONFIGURATION (PostgreSQL on Render)
# =====================================================
# Render provides DATABASE_URL in format: postgres://user:password@host:port/database
# We'll parse it or use individual environment variables
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for PostgreSQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# =====================================================
# JSP CONFIGURATION
# =====================================================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# =====================================================
# QSSN EMAIL SERVICE CONFIGURATION
# =====================================================
qssn.email.api.key=${QSSN_EMAIL_API_KEY:qssn_live_9e923f45d56ede8ec89ded81b13ccc246823cbb1bff67d31d07538c584a424fe}
qssn.email.api.url=${QSSN_EMAIL_API_URL:https://qssn-d1-api.gastonsoftwaresolutions234.workers.dev/api/v1/emails/send}
qssn.email.from.name=${QSSN_EMAIL_FROM_NAME:Pahappa Attendance System}
qssn.email.enabled=${QSSN_EMAIL_ENABLED:true}

# =====================================================
# APPLICATION SETTINGS
# =====================================================
app.name=Pahappa Attendance System
app.version=2.0.0
app.admin.email=${APP_ADMIN_EMAIL:admin@pahappa.com}

# =====================================================
# WORK SCHEDULE DEFAULT SETTINGS
# =====================================================
app.work.start-time=09:00
app.work.end-time=17:00
app.work.grace-period-minutes=15
app.work.minimum-hours=8.0

# =====================================================
# NOTIFICATION SETTINGS
# =====================================================
app.notifications.late-arrival.enabled=true
app.notifications.early-departure.enabled=true
app.notifications.daily-summary.enabled=false
app.notifications.weekly-report.enabled=false

# =====================================================
# QR CODE SETTINGS
# =====================================================
app.qrcode.enabled=true
app.qrcode.expiry-hours=24
app.qrcode.size=300

# =====================================================
# SECURITY SETTINGS
# =====================================================
# Session timeout (30 minutes)
server.servlet.session.timeout=1800s

# Remember me token validity (7 days)
spring.security.remember-me.token-validity-seconds=604800

# =====================================================
# FILE UPLOAD SETTINGS
# =====================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =====================================================
# LOGGING CONFIGURATION (Production)
# =====================================================
logging.level.root=INFO
logging.level.com.pahappa.app=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =====================================================
# ACTUATOR ENDPOINTS (for health checks)
# =====================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.health.defaults.enabled=true

# =====================================================
# TIMEZONE CONFIGURATION
# =====================================================
spring.jackson.time-zone=Africa/Kampala
spring.jpa.properties.hibernate.jdbc.time_zone=Africa/Kampala

# =====================================================
# ASYNC CONFIGURATION
# =====================================================
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=50

# =====================================================
# THYMELEAF CONFIGURATION (for email templates)
# =====================================================
spring.thymeleaf.cache=true
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# =====================================================
# PRODUCTION OPTIMIZATIONS
# =====================================================
# Disable DevTools
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Enable compression
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# HTTP/2 Support
server.http2.enabled=true

# =====================================================
# ERROR HANDLING
# =====================================================
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never

